<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cifrador RSA de Texto Completo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cifrador RSA de Texto</h1>
        
        <div class="input-section">
            <div class="input-group">
                <label for="p-input">Primo p (sugerido > 17):</label>
                <input type="number" id="p-input" value="47" min="2">
            </div>
            <div class="input-group">
                <label for="q-input">Primo q (sugerido > 17):</label>
                <input type="number" id="q-input" value="53" min="2">
            </div>
            <div class="input-group full-width">
                <label for="m-input">Texto a Encriptar:</label>
                <input type="text" id="m-input" value="RSA EN ACCION" placeholder="Escribe tu mensaje aquí...">
            </div>
            <div class="input-group full-width">
                <label for="e-select">Clave Pública (e):</label>
                <select id="e-select"></select>
            </div>
            <div id="warning-msg" class="warning hidden">¡Atención! p y q deben ser primos, y n debe ser mayor a 255.</div>
        </div>

        <div class="output-section">
            <h2>Parámetros de Clave</h2>
            <div class="math-grid">
                <p><strong>n:</strong> <span id="out-n">-</span></p>
                <p><strong>&phi;(n):</strong> <span id="out-phi">-</span></p>
                <p><strong>Clave Privada (d):</strong> <span id="out-d">-</span></p>
            </div>

            <h2>Mensaje Encriptado (Total)</h2>
            <p class="subtitle">Representación en formato Hexadecimal bloque por bloque:</p>
            <div id="out-c-total" class="crypto-box">-</div>

            <h2>Mensaje Descifrado</h2>
            <p class="subtitle">Reversión del algoritmo a texto plano:</p>
            <div id="out-m-dec" class="crypto-box success">-</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
